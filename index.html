<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Threshold Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:       #f0f2f5;
    --surface:  #ffffff;
    --surface2: #e8eaed;
    --border:   #d1d5db;
    --text:     #1f2937;
    --muted:    #6b7280;
    --accent:   #2563eb;
    --accent2:  #7c3aed;

    --blue-bg:  #dbeafe; --blue-txt:  #1d4ed8;
    --red-bg:   #fee2e2; --red-txt:   #dc2626;
    --green-bg: #dcfce7; --green-txt: #16a34a;
    --pink-bg:  #fce7f3; --pink-txt:  #be185d;
    --dred-bg:  #fecaca; --dred-txt:  #991b1b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; min-height: 100vh; }

  /* LOADING */
  #overlay { position: fixed; inset: 0; background: rgba(240,242,245,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 14px; }
  #overlay.hide { display: none; }
  .ring { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-lbl  { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .load-step { font-size: 11px; color: var(--accent); }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .logo { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: .05em; }
  .logo span { color: var(--muted); }
  .hdr-r { display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; box-shadow: 0 0 5px #16a34a; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn:hover { background: var(--accent); color: #fff; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.green  { border-color: #16a34a; color: #16a34a; }
  .btn.green:hover { background: #16a34a; color: #fff; }
  .spin-i { display: inline-block; animation: spin 1s linear infinite; }

  /* LEGEND */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; padding: 8px 24px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); }
  .li { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; }
  .d-blue  { background: var(--blue-bg);  border: 1px solid var(--blue-txt); }
  .d-red   { background: var(--red-bg);   border: 1px solid var(--red-txt); }
  .d-dred  { background: var(--dred-bg);  border: 1px solid var(--dred-txt); }
  .d-green { background: var(--green-bg); border: 1px solid var(--green-txt); }
  .d-pink  { background: var(--pink-bg);  border: 1px solid var(--pink-txt); }

  /* STATS */
  .stats { display: flex; gap: 10px; padding: 14px 24px; flex-wrap: wrap; }
  .sc { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; min-width: 125px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .sc .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .sc .val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  .sc .val.r { color: var(--red-txt); }
  .sc .val.g { color: var(--green-txt); }
  .sc .sub   { font-size: 9px; color: var(--muted); margin-top: 1px; }

  /* CONTROLS */
  .ctrl { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 10px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tabs { display: flex; gap: 3px; }
  .tab { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all .15s; }
  .tab.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .tab:not(.on):hover { border-color: var(--accent); color: var(--accent); }
  .ctrl input[type=text] { padding: 6px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; width: 200px; outline: none; }
  .ctrl input:focus { border-color: var(--accent); }
  .ctrl select { padding: 6px 9px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; cursor: pointer; }
  .rc { margin-left: auto; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .rc b { color: var(--accent); }

  /* ERROR */
  .err { margin: 12px 24px; padding: 11px 14px; background: var(--red-bg); border: 1px solid var(--red-txt); border-radius: 7px; color: var(--red-txt); font-size: 12px; line-height: 1.6; display: none; }
  .err.on { display: block; }

  /* TABLE WRAPPER — horizontal scroll */
  .tbl-outer { padding: 16px 24px; }
  .tbl-wrap  { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 12px; background: var(--surface); }

  /* Group header */
  .gh th { background: #e0e7ff; color: var(--accent); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .07em; text-transform: uppercase; padding: 8px 10px; border: 1px solid var(--border); text-align: center; white-space: nowrap; }
  .gh th.skh { background: var(--surface2); color: var(--muted); }

  /* Sub header */
  .sh th { background: var(--surface2); color: var(--muted); font-size: 10px; letter-spacing: .04em; text-transform: uppercase; padding: 6px 10px; border: 1px solid var(--border); text-align: center; white-space: nowrap; position: sticky; top: 53px; }
  .sh th.skh { text-align: left; position: sticky; left: 0; z-index: 10; background: var(--surface2); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: #f5f7ff; }
  td { padding: 5px 10px; border-right: 1px solid var(--border); text-align: center; white-space: nowrap; }
  td.skc { text-align: left; font-family: 'Space Mono', monospace; font-size: 10px; position: sticky; left: 0; background: var(--surface); z-index: 5; padding-left: 12px; min-width: 220px; border-right: 2px solid var(--border); }
  td.tyc { font-size: 10px; color: var(--muted); text-align: left; padding-left: 9px; min-width: 110px; border-right: 1px solid var(--border); position: sticky; left: 220px; background: var(--surface); z-index: 5; }
  tbody tr:hover td.skc,
  tbody tr:hover td.tyc { background: #f5f7ff; }

  /* Cell colours */
  .cb  { background: var(--blue-bg);  color: var(--blue-txt);  font-weight: 500; }
  .cr  { background: var(--red-bg);   color: var(--red-txt);   font-weight: 500; }
  .cdr { background: var(--dred-bg);  color: var(--dred-txt);  font-weight: 700; }
  .cdg { background: var(--green-bg); color: var(--green-txt); font-weight: 700; }
  .cz  { background: var(--pink-bg);  color: var(--pink-txt); }

  td.sep, th.sep { border-left: 2px solid var(--accent2) !important; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); background: var(--surface); }
  .empty .big { font-size: 38px; margin-bottom: 8px; }

  /* Updated timestamp */
  #updatedAt { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
</style>
</head>
<body>

<div id="overlay">
  <div class="ring"></div>
  <div class="load-lbl">Loading inventory data…</div>
  <div class="load-step" id="lstep">Connecting to Apps Script…</div>
</div>

<header>
  <div class="logo">INVENTORY<span>/</span>THRESHOLD</div>
  <div class="hdr-r">
    <div class="live-dot" title="Live data"></div>
    <span id="updatedAt">—</span>
    <button class="btn green" id="dlBtn" onclick="exportExcel()">⬇ Download Excel</button>
    <button class="btn" id="rfBtn" onclick="loadAll()"><span id="rfIco">↻</span> Refresh</button>
  </div>
</header>

<div class="legend">
  <div class="li"><div class="dot d-blue"></div>Threshold &gt; 1</div>
  <div class="li"><div class="dot d-red"></div>Threshold = 0</div>
  <div class="li"><div class="dot d-pink"></div>SKU has zero threshold</div>
  <div class="li"><div class="dot d-dred"></div>BP Discrepancy</div>
  <div class="li"><div class="dot d-green"></div>Optimal Discrepancy</div>
</div>

<div id="errBanner" class="err"></div>

<div class="stats">
  <div class="sc"><div class="lbl">Total SKUs</div><div class="val" id="sSkus">—</div></div>
  <div class="sc"><div class="lbl">Warehouses</div><div class="val" id="sWH">—</div></div>
  <div class="sc"><div class="lbl">BP Discrepancies</div><div class="val r" id="sBP">—</div></div>
  <div class="sc"><div class="lbl">Optimal Discrepancies</div><div class="val g" id="sOpt">—</div></div>
  <div class="sc"><div class="lbl">Zero Threshold SKUs</div><div class="val r" id="sZero">—</div></div>
</div>

<div class="ctrl">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('all')">All SKUs</button>
    <button class="tab"    onclick="switchTab('disc')">BP Discrepancy Only</button>
  </div>
  <input type="text" id="srch" placeholder="🔍 Search SKU…" oninput="render()"/>
  <select id="whSel" onchange="render()"><option value="">All Warehouses</option></select>
  <div class="rc" id="rc"><b>0</b> rows</div>
</div>

<div class="tbl-outer">
  <div class="tbl-wrap">
    <div id="tw"></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyTFkM3SvVSlbj6yTL26qNa-FfE41cyldTCHtnOGn4gqoi5_AX7_qUIhnWdmC7IEod9/exec';

let mode = 'all';
let DB   = { warehouses: [], rows: [], stats: {} };

// ── LOAD ─────────────────────────────────────────────────────
function loadAll() {
  showOverlay(true);
  disableRefresh(true);
  hideErr();
  step('Fetching data from Apps Script…');

  const old = document.getElementById('jsonp_script');
  if (old) old.remove();
  if (window.__jsonpTimeout) clearTimeout(window.__jsonpTimeout);

  window.__inventoryCallback = function(data) {
    const s = document.getElementById('jsonp_script');
    if (s) s.remove();
    clearTimeout(window.__jsonpTimeout);

    if (!data.ok) {
      showErr('Apps Script error: ' + (data.error || 'Unknown'));
      showOverlay(false); disableRefresh(false); return;
    }

    DB = data;
    populateWHFilter();
    updateStats(data.stats);
    const d = new Date(data.updated);
    document.getElementById('updatedAt').textContent =
      d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
    render();
    showOverlay(false);
    disableRefresh(false);
  };

  window.__jsonpTimeout = setTimeout(() => {
    showErr('Request timed out. Make sure the Apps Script is deployed with access set to "Anyone".');
    showOverlay(false); disableRefresh(false);
  }, 25000);

  const s = document.createElement('script');
  s.id  = 'jsonp_script';
  s.src = APPS_SCRIPT_URL + '?callback=__inventoryCallback';
  s.onerror = () => {
    clearTimeout(window.__jsonpTimeout);
    showErr('Failed to reach Apps Script. Check the URL and deployment settings.');
    showOverlay(false); disableRefresh(false);
  };
  document.head.appendChild(s);
}

function updateStats(s) {
  document.getElementById('sSkus').textContent  = s.totalSKUs;
  document.getElementById('sWH').textContent    = s.totalWH;
  document.getElementById('sBP').textContent    = s.totalBPDisc;
  document.getElementById('sOpt').textContent   = s.totalOptDisc;
  document.getElementById('sZero').textContent  = s.totalZero;
}

function populateWHFilter() {
  const sel = document.getElementById('whSel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Warehouses</option>';
  DB.warehouses.forEach(wh => {
    const o = document.createElement('option');
    o.value = wh; o.textContent = wh;
    if (wh === cur) o.selected = true;
    sel.appendChild(o);
  });
}

// ── TAB + RENDER ─────────────────────────────────────────────
function switchTab(t) {
  mode = t;
  document.querySelectorAll('.tabs .tab').forEach((el, i) =>
    el.classList.toggle('on', i === (t === 'all' ? 0 : 1)));
  render();
}

function getFilteredRows(whs) {
  const search = document.getElementById('srch').value.toLowerCase();
  let rows = DB.rows || [];
  if (search) rows = rows.filter(r => r.sku.toLowerCase().includes(search));
  if (mode === 'disc') {
    // Only SKUs that have BP discrepancy in at least one WH
    rows = rows.filter(row =>
      whs.some(wh => {
        const c = row.cells[wh];
        return c && c.discBP !== null && c.discBP !== 0;
      })
    );
  }
  return rows;
}

function render() {
  const tw   = document.getElementById('tw');
  const whF  = document.getElementById('whSel').value;
  let whs    = DB.warehouses || [];
  if (whF) whs = whs.filter(w => w === whF);

  const rows = getFilteredRows(whs);
  document.getElementById('rc').innerHTML = `<b>${rows.length}</b> rows`;

  if (!DB.rows || !DB.rows.length) {
    tw.innerHTML = `<div class="empty"><div class="big">📦</div><p>Waiting for data…</p></div>`;
    return;
  }
  if (!rows.length) {
    tw.innerHTML = `<div class="empty"><div class="big">🔍</div><p>No rows match your filters.</p></div>`;
    return;
  }

  let h = '<table><thead>';

  // Group headers
  h += '<tr class="gh"><th class="skh" rowspan="2">SKU</th><th class="skh" rowspan="2" style="min-width:110px;position:sticky;left:220px;z-index:11">Type</th>';
  whs.forEach((wh, i) => {
    h += `<th colspan="5"${i > 0 ? ' class="sep"' : ''}>${wh}</th>`;
  });
  h += '</tr>';

  // Sub headers
  h += '<tr class="sh">';
  whs.forEach((wh, i) => {
    const s = i > 0 ? ' sep' : '';
    h += `<th class="${s}">Threshold</th><th>BP</th><th>Optimal</th><th>Disc BP</th><th>Disc Opt</th>`;
  });
  h += '</tr></thead><tbody>';

  rows.forEach(row => {
    const flagged = whs.some(wh => row.cells[wh] && row.cells[wh].th === 0);
    h += '<tr>';
    h += `<td class="skc${flagged ? ' cz' : ''}">${row.sku}</td>`;
    h += `<td class="tyc${flagged ? ' cz' : ''}">${row.type || ''}</td>`;

    whs.forEach((wh, i) => {
      const c   = row.cells[wh] || { th: null, bp: null, opt: null, discBP: null, discOpt: null };
      const sep = i > 0 ? ' sep' : '';

      // Threshold
      let tc = sep;
      if      (c.th === 0)                tc += ' cr';
      else if (c.th !== null && c.th > 1) tc += ' cb';
      h += `<td class="${tc}">${c.th !== null ? c.th : '—'}</td>`;

      // BP
      let bc = '';
      if      (c.bp === 0)                bc = ' cr';
      else if (c.bp !== null && c.bp > 1) bc = ' cb';
      h += `<td class="${bc}">${c.bp !== null ? c.bp : '—'}</td>`;

      // Optimal
      h += `<td>${c.opt !== null ? c.opt : '—'}</td>`;

      // Disc BP
      h += `<td class="${c.discBP !== null && c.discBP !== 0 ? ' cdr' : ''}">${c.discBP !== null ? (c.discBP > 0 ? '+' : '') + c.discBP : '—'}</td>`;

      // Disc Opt
      h += `<td class="${c.discOpt !== null && c.discOpt !== 0 ? ' cdg' : ''}">${c.discOpt !== null ? (c.discOpt > 0 ? '+' : '') + c.discOpt : '—'}</td>`;
    });
    h += '</tr>';
  });

  h += '</tbody></table>';
  tw.innerHTML = h;
}

// ── EXCEL EXPORT ─────────────────────────────────────────────
function exportExcel() {
  if (!DB.rows || !DB.rows.length) { alert('No data to export.'); return; }

  const wb   = XLSX.utils.book_new();
  const whs  = DB.warehouses;

  // Colour definitions
  const COLORS = {
    blue_bg:  'DBEAFE', blue_txt:  '1D4ED8',
    red_bg:   'FEE2E2', red_txt:   'DC2626',
    dred_bg:  'FECACA', dred_txt:  '991B1B',
    green_bg: 'DCFCE7', green_txt: '16A34A',
    pink_bg:  'FCE7F3', pink_txt:  'BE185D',
    grey_hdr: 'E0E7FF', grey_sub:  'E8EAED',
    wh_sep:   '7C3AED',
    white:    'FFFFFF'
  };

  function cellStyle(bgHex, txtHex, bold) {
    return {
      font:      { name: 'Arial', sz: 9, bold: !!bold, color: { rgb: txtHex || '1F2937' } },
      fill:      { fgColor: { rgb: bgHex || 'FFFFFF' }, patternType: 'solid' },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: false },
      border: {
        top:    { style: 'thin', color: { rgb: 'D1D5DB' } },
        bottom: { style: 'thin', color: { rgb: 'D1D5DB' } },
        left:   { style: 'thin', color: { rgb: 'D1D5DB' } },
        right:  { style: 'thin', color: { rgb: 'D1D5DB' } }
      }
    };
  }

  function buildSheet(rows) {
    const wsData = [];
    const merges = [];
    const styles = {}; // col-row → style object

    // Row 0: group header
    const grpRow = ['SKU', 'Type'];
    whs.forEach(wh => { grpRow.push(wh, '', '', '', ''); });
    wsData.push(grpRow);

    // Row 1: sub headers
    const subRow = ['', ''];
    whs.forEach(() => subRow.push('Threshold', 'BP', 'Optimal', 'Disc BP', 'Disc Opt'));
    wsData.push(subRow);

    // Merges for group headers
    // SKU spans 2 rows, Type spans 2 rows
    merges.push({ s: { r: 0, c: 0 }, e: { r: 1, c: 0 } });
    merges.push({ s: { r: 0, c: 1 }, e: { r: 1, c: 1 } });
    whs.forEach((_, i) => {
      const startCol = 2 + i * 5;
      merges.push({ s: { r: 0, c: startCol }, e: { r: 0, c: startCol + 4 } });
    });

    // Data rows
    rows.forEach(row => {
      const r = [row.sku, row.type || ''];
      whs.forEach(wh => {
        const c = row.cells[wh] || { th: null, bp: null, opt: null, discBP: null, discOpt: null };
        r.push(
          c.th  !== null ? c.th  : '',
          c.bp  !== null ? c.bp  : '',
          c.opt !== null ? c.opt : '',
          c.discBP  !== null ? c.discBP  : '',
          c.discOpt !== null ? c.discOpt : ''
        );
      });
      wsData.push(r);
    });

    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!merges'] = merges;

    // Column widths
    const colWidths = [{ wch: 30 }, { wch: 14 }];
    whs.forEach(() => {
      colWidths.push({ wch: 10 }, { wch: 8 }, { wch: 10 }, { wch: 9 }, { wch: 9 });
    });
    ws['!cols'] = colWidths;

    // Apply cell styles
    const totalCols = 2 + whs.length * 5;

    // Header row 0 styles
    for (let c = 0; c < totalCols; c++) {
      const addr = XLSX.utils.encode_cell({ r: 0, c });
      if (!ws[addr]) ws[addr] = { v: '', t: 's' };
      const isWHCol = c >= 2;
      ws[addr].s = cellStyle(
        isWHCol ? COLORS.grey_hdr : COLORS.grey_sub,
        COLORS.blue_txt, true
      );
    }

    // Sub-header row 1 styles
    for (let c = 0; c < totalCols; c++) {
      const addr = XLSX.utils.encode_cell({ r: 1, c });
      if (!ws[addr]) ws[addr] = { v: '', t: 's' };
      ws[addr].s = cellStyle(COLORS.grey_sub, '6B7280', true);
    }

    // Data row styles
    rows.forEach((row, ri) => {
      const excelRow = ri + 2;
      const flagged  = whs.some(wh => row.cells[wh] && row.cells[wh].th === 0);

      // SKU col
      const skuAddr = XLSX.utils.encode_cell({ r: excelRow, c: 0 });
      if (!ws[skuAddr]) ws[skuAddr] = { v: row.sku, t: 's' };
      ws[skuAddr].s = {
        font:      { name: 'Arial', sz: 9, bold: false, color: { rgb: flagged ? COLORS.pink_txt : '1F2937' } },
        fill:      { fgColor: { rgb: flagged ? COLORS.pink_bg : COLORS.white }, patternType: 'solid' },
        alignment: { horizontal: 'left', vertical: 'center' },
        border: {
          top: { style:'thin',color:{rgb:'D1D5DB'} }, bottom: { style:'thin',color:{rgb:'D1D5DB'} },
          left:{ style:'thin',color:{rgb:'D1D5DB'} }, right: { style:'medium',color:{rgb:'D1D5DB'} }
        }
      };

      // Type col
      const tyAddr = XLSX.utils.encode_cell({ r: excelRow, c: 1 });
      if (!ws[tyAddr]) ws[tyAddr] = { v: row.type || '', t: 's' };
      ws[tyAddr].s = {
        font:      { name: 'Arial', sz: 9, color: { rgb: flagged ? COLORS.pink_txt : '6B7280' } },
        fill:      { fgColor: { rgb: flagged ? COLORS.pink_bg : COLORS.white }, patternType: 'solid' },
        alignment: { horizontal: 'left', vertical: 'center' },
        border: {
          top:{style:'thin',color:{rgb:'D1D5DB'}}, bottom:{style:'thin',color:{rgb:'D1D5DB'}},
          left:{style:'thin',color:{rgb:'D1D5DB'}}, right:{style:'thin',color:{rgb:'D1D5DB'}}
        }
      };

      // WH cells
      whs.forEach((wh, wi) => {
        const c      = row.cells[wh] || { th:null, bp:null, opt:null, discBP:null, discOpt:null };
        const base   = 2 + wi * 5;
        const isFirst= wi === 0;

        function applyStyle(colOffset, val, bgHex, txtHex, bold) {
          const addr = XLSX.utils.encode_cell({ r: excelRow, c: base + colOffset });
          if (!ws[addr]) ws[addr] = { v: val === null || val === '' ? '' : val, t: val === '' || val === null ? 's' : 'n' };
          ws[addr].s = {
            font:      { name: 'Arial', sz: 9, bold: !!bold, color: { rgb: txtHex || '1F2937' } },
            fill:      { fgColor: { rgb: bgHex || COLORS.white }, patternType: 'solid' },
            alignment: { horizontal: 'center', vertical: 'center' },
            border: {
              top:   { style: 'thin',   color: { rgb: 'D1D5DB' } },
              bottom:{ style: 'thin',   color: { rgb: 'D1D5DB' } },
              left:  { style: colOffset === 0 && !isFirst ? 'medium' : 'thin', color: { rgb: colOffset === 0 && !isFirst ? COLORS.wh_sep : 'D1D5DB' } },
              right: { style: 'thin',   color: { rgb: 'D1D5DB' } }
            }
          };
        }

        // Threshold
        let thBg = COLORS.white, thTxt = '1F2937';
        if      (c.th === 0)              { thBg = COLORS.red_bg;  thTxt = COLORS.red_txt; }
        else if (c.th !== null && c.th>1) { thBg = COLORS.blue_bg; thTxt = COLORS.blue_txt; }
        applyStyle(0, c.th, thBg, thTxt, false);

        // BP
        let bpBg = COLORS.white, bpTxt = '1F2937';
        if      (c.bp === 0)              { bpBg = COLORS.red_bg;  bpTxt = COLORS.red_txt; }
        else if (c.bp !== null && c.bp>1) { bpBg = COLORS.blue_bg; bpTxt = COLORS.blue_txt; }
        applyStyle(1, c.bp, bpBg, bpTxt, false);

        // Optimal
        applyStyle(2, c.opt, COLORS.white, '1F2937', false);

        // Disc BP
        const hasBPDisc = c.discBP !== null && c.discBP !== 0;
        applyStyle(3, c.discBP, hasBPDisc ? COLORS.dred_bg : COLORS.white, hasBPDisc ? COLORS.dred_txt : '1F2937', hasBPDisc);

        // Disc Opt
        const hasOptDisc = c.discOpt !== null && c.discOpt !== 0;
        applyStyle(4, c.discOpt, hasOptDisc ? COLORS.green_bg : COLORS.white, hasOptDisc ? COLORS.green_txt : '1F2937', hasOptDisc);
      });
    });

    // Freeze first 2 rows + first 2 cols
    ws['!freeze'] = { xSplit: 2, ySplit: 2, topLeftCell: 'C3', activePane: 'bottomRight', state: 'frozen' };

    return ws;
  }

  // ── Sheet 1: All SKUs
  const allRows  = DB.rows;
  const discRows = DB.rows.filter(row =>
    whs.some(wh => {
      const c = row.cells[wh];
      return c && c.discBP !== null && c.discBP !== 0;
    })
  );

  const wsAll  = buildSheet(allRows);
  const wsDisc = buildSheet(discRows);

  XLSX.utils.book_append_sheet(wb, wsAll,  'All SKUs');
  XLSX.utils.book_append_sheet(wb, wsDisc, 'BP Discrepancy');

  const date = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `inventory_threshold_${date}.xlsx`);
}

// ── HELPERS ──────────────────────────────────────────────────
function step(t)           { document.getElementById('lstep').textContent = t; }
function showOverlay(v)    { document.getElementById('overlay').classList.toggle('hide', !v); }
function disableRefresh(v) {
  document.getElementById('rfBtn').disabled = v;
  document.getElementById('rfIco').className = v ? 'spin-i' : '';
}
function hideErr()  { document.getElementById('errBanner').classList.remove('on'); }
function showErr(m) { const b = document.getElementById('errBanner'); b.textContent = m; b.classList.add('on'); }

loadAll();
</script>
