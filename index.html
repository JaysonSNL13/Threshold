<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Threshold Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2330;--border:#2a2f3e;
    --text:#e8eaf0;--muted:#7b82a0;--accent:#4e9af1;--accent2:#a78bfa;
    --blue-bg:#1a3a5c;--blue-txt:#7ec8f5;
    --red-bg:#3d1a1a;--red-txt:#f87171;
    --green-bg:#1a3d28;--green-txt:#4ade80;
    --pink-bg:#3d1a2a;--pink-txt:#f9a8d4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh;}

  /* LOADING */
  #overlay{position:fixed;inset:0;background:rgba(15,17,23,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
  .ring{width:46px;height:46px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .load-txt{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  .load-step{font-size:11px;color:var(--accent);min-height:16px;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.05em;}
  .logo span{color:var(--muted);}
  .hdr-right{display:flex;gap:10px;align-items:center;}
  .btn{padding:6px 14px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--accent);color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .spin-icon{display:inline-block;animation:spin 1s linear infinite;}



  /* LEGEND */
  .legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:9px 24px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);}
  .li{display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:2px;}
  .d-blue{background:var(--blue-bg);border:1px solid var(--blue-txt);}
  .d-red{background:var(--red-bg);border:1px solid var(--red-txt);}
  .d-dred{background:#6b0000;border:1px solid #fca5a5;}
  .d-green{background:var(--green-bg);border:1px solid var(--green-txt);}
  .d-pink{background:var(--pink-bg);border:1px solid var(--pink-txt);}

  /* STATS */
  .stats{display:flex;gap:10px;padding:12px 24px;flex-wrap:wrap;}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 16px;min-width:120px;}
  .sc .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .sc .val{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--accent);}
  .sc .val.r{color:var(--red-txt);} .sc .val.g{color:var(--green-txt);}
  .sc .ts{font-size:9px;color:var(--muted);margin-top:2px;}

  /* CONTROLS */
  .ctrl{display:flex;gap:9px;flex-wrap:wrap;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
  .tabs{display:flex;gap:4px;}
  .tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
  .tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .tab:not(.on):hover{border-color:var(--accent);color:var(--accent);}
  .ctrl input[type=text]{padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;width:210px;outline:none;}
  .ctrl input:focus{border-color:var(--accent);}
  .ctrl select{padding:6px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;}
  .rc{margin-left:auto;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
  .rc b{color:var(--accent);}

  /* ERROR */
  .err{margin:12px 24px;padding:11px 14px;background:var(--red-bg);border:1px solid var(--red-txt);border-radius:7px;color:var(--red-txt);font-size:12px;display:none;}
  .err.on{display:block;}

  /* TABLE */
  .tbl-wrap{padding:18px 24px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  .gh th{background:var(--surface2);color:var(--accent);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:8px 9px;border:1px solid var(--border);text-align:center;white-space:nowrap;}
  .gh th.sc0{background:var(--surface);color:var(--muted);}
  .sh th{background:var(--surface);color:var(--muted);font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:6px 9px;border:1px solid var(--border);text-align:center;position:sticky;top:53px;white-space:nowrap;}
  .sh th.sc0{text-align:left;position:sticky;left:0;z-index:10;background:var(--surface);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:hover{background:rgba(78,154,241,.04);}
  td{padding:5px 9px;border-right:1px solid var(--border);text-align:center;white-space:nowrap;}
  td.skc{text-align:left;font-family:'Space Mono',monospace;font-size:10px;position:sticky;left:0;background:var(--bg);z-index:5;padding-left:11px;min-width:220px;border-right:2px solid var(--border);}
  tbody tr:hover td.skc{background:var(--surface2);}
  .cb{background:var(--blue-bg);color:var(--blue-txt);font-weight:500;}
  .cr{background:var(--red-bg);color:var(--red-txt);font-weight:500;}
  .cdr{background:#6b0000;color:#fca5a5;font-weight:700;}
  .cdg{background:var(--green-bg);color:var(--green-txt);font-weight:700;}
  .cz{background:var(--pink-bg);color:var(--pink-txt);}
  td.sep,th.sep{border-left:2px solid var(--accent2)!important;}
  .empty{text-align:center;padding:56px 20px;color:var(--muted);}
  .empty .big{font-size:38px;margin-bottom:8px;}
</style>
</head>
<body>

<div id="overlay">
  <div class="ring"></div>
  <div class="load-txt">Connecting to Google Sheets…</div>
  <div class="load-step" id="lstep">Initializing…</div>
</div>

<header>
  <div class="logo">INVENTORY<span>/</span>THRESHOLD</div>
  <div class="hdr-right">
    <span style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace">LIVE DATA</span>
    <button class="btn" id="rfBtn" onclick="loadAll()"><span id="rfIco">↻</span> Refresh</button>
  </div>
</header>



<div class="legend">
  <div class="li"><div class="dot d-blue"></div>Threshold &gt; 1</div>
  <div class="li"><div class="dot d-red"></div>Threshold = 0</div>
  <div class="li"><div class="dot d-pink"></div>SKU has zero threshold</div>
  <div class="li"><div class="dot d-dred"></div>BP Discrepancy</div>
  <div class="li"><div class="dot d-green"></div>Optimal Discrepancy</div>
</div>

<div id="errBanner" class="err"></div>

<div class="stats">
  <div class="sc"><div class="lbl">Total SKUs</div><div class="val" id="sSkus">—</div></div>
  <div class="sc"><div class="lbl">Warehouses</div><div class="val" id="sWH">—</div></div>
  <div class="sc"><div class="lbl">BP Discrepancies</div><div class="val r" id="sBP">—</div></div>
  <div class="sc"><div class="lbl">Optimal Discrepancies</div><div class="val g" id="sOpt">—</div></div>
  <div class="sc"><div class="lbl">Zero Threshold SKUs</div><div class="val r" id="sZero">—</div></div>
  <div class="sc"><div class="lbl">Last Refreshed</div><div class="val" id="sTime" style="font-size:13px">—</div><div class="ts" id="sDate"></div></div>
</div>

<div class="ctrl">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('all')">All SKUs</button>
    <button class="tab" onclick="switchTab('disc')">Discrepancy Only</button>
  </div>
  <input type="text" id="srch" placeholder="🔍 Search SKU…" oninput="render()"/>
  <select id="whSel" onchange="render()"><option value="">All Warehouses</option></select>
  <div class="rc" id="rc"><b>0</b> rows</div>
</div>

<div class="tbl-wrap"><div id="tw"></div></div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────── */
// Default sheet IDs from the URLs you provided
const DEF = {
  bp_id:  '1Wz-eCLZSlF6TWXmDtv6tZvASNvpPQkJgUAoFZy8SBHE',
  bp_gid: '688442082',
  th_id:  '1rRozwDKVpEocN1MuOSNpAdaILeLo93d8zZ2LbtbxM0A',
  th_gid: '1625083553',
  opt_gid: '' // set to the GID of your Optimal Stock tab if it's separate
};

let S = { ...DEF };
let mode = 'all';
let DB = { skus:[], whs:[], rows:[], bpMap:{}, thMap:{}, optMap:{} };

/* ─── FETCH ─────────────────────────────────────────────── */
function csvURL(id, gid) {
  return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
}

async function fetchCSV(url) {
  // Direct fetch (works when sheet is publicly shared)
  try {
    const r = await fetch(url, { redirect: 'follow' });
    if (r.ok) {
      const t = await r.text();
      if (t.length > 10 && (t.includes(',') || t.includes('\n'))) return t;
    }
  } catch(e) {}
  // CORS proxy fallback
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const r2 = await fetch(proxy);
  if (!r2.ok) throw new Error(`Proxy HTTP ${r2.status}`);
  const j = await r2.json();
  if (!j.contents) throw new Error('Empty response from proxy');
  return j.contents;
}

/* ─── CSV PARSER ────────────────────────────────────────── */
function parseCSV(text) {
  return text.trim().split(/\r?\n/).map(line => {
    const out=[]; let cur='', q=false;
    for (let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){q=!q;}
      else if(c===','&&!q){out.push(cur.trim());cur='';}
      else cur+=c;
    }
    out.push(cur.trim());
    return out;
  });
}

/* ─── LOAD ALL ──────────────────────────────────────────── */
async function loadAll() {
  show('overlay');
  const btn = document.getElementById('rfBtn');
  btn.disabled = true;
  document.getElementById('rfIco').className = 'spin-icon';
  hide('errBanner');

  try {
    step('Fetching BP Threshold data…');
    const bpCSV = await fetchCSV(csvURL(S.bp_id, S.bp_gid));
    parseBP(bpCSV);

    step('Fetching Threshold data…');
    const thCSV = await fetchCSV(csvURL(S.th_id, S.th_gid));
    parseTH(thCSV);

    if (S.opt_gid) {
      step('Fetching Optimal Stock data…');
      try {
        const optCSV = await fetchCSV(csvURL(S.th_id, S.opt_gid));
        parseOpt(optCSV);
      } catch(e){ console.warn('Optimal tab skipped:', e); }
    }

    step('Building table…');
    buildDB();

    const n = new Date();
    document.getElementById('sTime').textContent = n.toLocaleTimeString();
    document.getElementById('sDate').textContent = n.toLocaleDateString();

  } catch(err) {
    showErr(`Could not load data: ${err.message}. Make sure both sheets are set to "Anyone with the link → Viewer".`);
    console.error(err);
  }

  hide('overlay');
  btn.disabled = false;
  document.getElementById('rfIco').className = '';
}

/* ─── PARSERS ───────────────────────────────────────────── */
// BP Sheet: A=ProductID, B=ProductName, C=SKU, D=ThresholdQTY, E=WarehouseName
function parseBP(csv) {
  const rows = parseCSV(csv);
  const h = rows[0].map(x => x.toLowerCase());
  const ci = {
    sku: findCol(h, ['sku']) ?? 2,
    qty: findCol(h, ['threshold qty','threshold','qty']) ?? 3,
    wh:  findCol(h, ['warehouse','location','wh']) ?? 4
  };
  DB.bpMap = {};
  rows.slice(1).forEach(r => {
    const sku = (r[ci.sku]||'').trim();
    const wh  = (r[ci.wh]||'').trim();
    const qty = parseInt(r[ci.qty]) || 0;
    if (!sku || !wh) return;
    if (!DB.bpMap[sku]) DB.bpMap[sku] = {};
    DB.bpMap[sku][wh] = qty;
  });
}

// Threshold Sheet: A=SKU, B1:= warehouse names (wide format)
function parseTH(csv) {
  const rows = parseCSV(csv);
  if (!rows.length) return;
  const whs = rows[0].slice(1).map(w=>w.trim()).filter(Boolean);
  DB.thMap = {};
  DB.whs = whs;
  rows.slice(1).forEach(r => {
    const sku = (r[0]||'').trim();
    if (!sku) return;
    DB.thMap[sku] = {};
    whs.forEach((wh,i) => {
      const v = r[i+1];
      DB.thMap[sku][wh] = (v!==undefined && v!=='') ? (parseInt(v)||0) : null;
    });
  });
}

// Optimal Stock: A=Warehouse, B=SKU, C=Threshold (long format)
function parseOpt(csv) {
  const rows = parseCSV(csv);
  DB.optMap = {};
  rows.slice(1).forEach(r => {
    const wh  = (r[0]||'').trim();
    const sku = (r[1]||'').trim();
    const qty = (r[2]!==undefined && r[2]!=='') ? parseInt(r[2]) : null;
    if (!wh || !sku) return;
    if (!DB.optMap[sku]) DB.optMap[sku] = {};
    DB.optMap[sku][wh] = qty;
  });
}

function findCol(headers, keys) {
  for (const k of keys) {
    const i = headers.findIndex(h => h.includes(k));
    if (i !== -1) return i;
  }
  return null;
}

/* ─── BUILD DB ──────────────────────────────────────────── */
function buildDB() {
  // Merge WH names
  const whSet = new Set(DB.whs || []);
  Object.values(DB.bpMap).forEach(m => Object.keys(m).forEach(w => whSet.add(w)));
  DB.whs = [...whSet];

  // All SKUs
  const skuSet = new Set([...Object.keys(DB.bpMap), ...Object.keys(DB.thMap)]);
  DB.skus = [...skuSet].sort();

  DB.rows = DB.skus.map(sku => {
    const cells = {};
    DB.whs.forEach(wh => {
      const th  = DB.thMap[sku]  ? DB.thMap[sku][wh]  ?? null : null;
      const bp  = DB.bpMap[sku]  ? DB.bpMap[sku][wh]  ?? null : null;
      const opt = DB.optMap[sku] ? DB.optMap[sku][wh] ?? null : null;
      cells[wh] = {
        th, bp, opt,
        discBP:  bp!==null  && th!==null ? bp  - th : null,
        discOpt: opt!==null && th!==null ? opt - th : null
      };
    });
    return { sku, cells };
  });

  updateStats();
  buildWHFilter();
  render();
}

function updateStats() {
  let bd=0, od=0, z=0;
  DB.rows.forEach(row => {
    let hz = false;
    DB.whs.forEach(wh => {
      const c = row.cells[wh];
      if (c.discBP  !== null && c.discBP  !== 0) bd++;
      if (c.discOpt !== null && c.discOpt !== 0) od++;
      if (c.th === 0) hz = true;
    });
    if (hz) z++;
  });
  document.getElementById('sSkus').textContent = DB.rows.length;
  document.getElementById('sWH').textContent   = DB.whs.length;
  document.getElementById('sBP').textContent   = bd;
  document.getElementById('sOpt').textContent  = od;
  document.getElementById('sZero').textContent = z;
}

function buildWHFilter() {
  const sel = document.getElementById('whSel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Warehouses</option>';
  DB.whs.forEach(wh => {
    const o = document.createElement('option');
    o.value = wh; o.textContent = wh;
    if (wh === cur) o.selected = true;
    sel.appendChild(o);
  });
}

/* ─── RENDER ────────────────────────────────────────────── */
function switchTab(t) {
  mode = t;
  document.querySelectorAll('.tabs .tab').forEach((el,i) => el.classList.toggle('on', i===(t==='all'?0:1)));
  render();
}

function render() {
  const tw     = document.getElementById('tw');
  const search = document.getElementById('srch').value.toLowerCase();
  const whF    = document.getElementById('whSel').value;

  let whs  = DB.whs;
  if (whF) whs = whs.filter(w => w === whF);

  let rows = DB.rows;
  if (search) rows = rows.filter(r => r.sku.toLowerCase().includes(search));
  if (mode === 'disc') {
    rows = rows.filter(row => whs.some(wh => {
      const c = row.cells[wh];
      return (c.discBP !== null && c.discBP !== 0) || (c.discOpt !== null && c.discOpt !== 0);
    }));
  }

  document.getElementById('rc').innerHTML = `<b>${rows.length}</b> rows`;

  if (!DB.rows.length) {
    tw.innerHTML = `<div class="empty"><div class="big">📦</div><p>Fetching live data from Google Sheets…</p></div>`;
    return;
  }
  if (!rows.length) {
    tw.innerHTML = `<div class="empty"><div class="big">🔍</div><p>No rows match your filters.</p></div>`;
    return;
  }

  let h = '<table><thead>';

  // Group headers
  h += '<tr class="gh"><th class="sc0" rowspan="2">SKU</th>';
  whs.forEach((wh,i) => { h += `<th colspan="5"${i>0?' class="sep"':''}>${wh}</th>`; });
  h += '</tr>';

  // Sub headers
  h += '<tr class="sh"><th class="sc0" style="display:none"></th>';
  whs.forEach((wh,i) => {
    const s = i>0?' sep':'';
    h += `<th class="${s}">Threshold</th><th>BP</th><th>Optimal</th><th>Disc BP</th><th>Disc Opt</th>`;
  });
  h += '</tr></thead><tbody>';

  rows.forEach(row => {
    const flagged = whs.some(wh => row.cells[wh]?.th === 0);
    h += '<tr>';
    h += `<td class="skc${flagged?' cz':''}">${row.sku}</td>`;
    whs.forEach((wh,i) => {
      const c   = row.cells[wh] || { th:null,bp:null,opt:null,discBP:null,discOpt:null };
      const sep = i>0?' sep':'';

      // Threshold
      let tc=sep;
      if      (c.th===0)               tc+=' cr';
      else if (c.th!==null && c.th>1)  tc+=' cb';
      h += `<td class="${tc}">${c.th!==null?c.th:'—'}</td>`;

      // BP
      let bc='';
      if      (c.bp===0)               bc=' cr';
      else if (c.bp!==null && c.bp>1)  bc=' cb';
      h += `<td class="${bc}">${c.bp!==null?c.bp:'—'}</td>`;

      // Optimal
      h += `<td>${c.opt!==null?c.opt:'—'}</td>`;

      // Disc BP
      h += `<td class="${c.discBP!==null&&c.discBP!==0?' cdr':''}">${c.discBP!==null?(c.discBP>0?'+':'')+c.discBP:'—'}</td>`;

      // Disc Opt
      h += `<td class="${c.discOpt!==null&&c.discOpt!==0?' cdg':''}">${c.discOpt!==null?(c.discOpt>0?'+':'')+c.discOpt:'—'}</td>`;
    });
    h += '</tr>';
  });

  h += '</tbody></table>';
  tw.innerHTML = h;
}

/* ─── HELPERS ───────────────────────────────────────────── */
function step(t){ document.getElementById('lstep').textContent = t; }
function show(id){ document.getElementById(id).style.display='flex'; }
function hide(id){ document.getElementById(id).style.display='none'; }
function showErr(msg){
  const b=document.getElementById('errBanner');
  b.textContent='⚠ '+msg; b.classList.add('on');
}

/* ─── BOOT ──────────────────────────────────────────────── */
loadAll();
</script>
</body>
</html>
