<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Threshold Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2330;--border:#2a2f3e;
    --text:#e8eaf0;--muted:#7b82a0;--accent:#4e9af1;--accent2:#a78bfa;
    --blue-bg:#1a3a5c;--blue-txt:#7ec8f5;
    --red-bg:#3d1a1a;--red-txt:#f87171;
    --green-bg:#1a3d28;--green-txt:#4ade80;
    --pink-bg:#3d1a2a;--pink-txt:#f9a8d4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh;}

  /* LOADING */
  #overlay{position:fixed;inset:0;background:rgba(15,17,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
  #overlay.hide{display:none;}
  .ring{width:46px;height:46px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .load-lbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  .load-step{font-size:11px;color:var(--accent);}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.05em;}
  .logo span{color:var(--muted);}
  .hdr-r{display:flex;align-items:center;gap:10px;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green-txt);box-shadow:0 0 6px var(--green-txt);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .btn{padding:6px 14px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--accent);color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .spin-i{display:inline-block;animation:spin 1s linear infinite;}

  /* LEGEND */
  .legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:9px 24px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);}
  .li{display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:2px;}
  .d-blue{background:var(--blue-bg);border:1px solid var(--blue-txt);}
  .d-red{background:var(--red-bg);border:1px solid var(--red-txt);}
  .d-dred{background:#6b0000;border:1px solid #fca5a5;}
  .d-green{background:var(--green-bg);border:1px solid var(--green-txt);}
  .d-pink{background:var(--pink-bg);border:1px solid var(--pink-txt);}

  /* STATS */
  .stats{display:flex;gap:10px;padding:12px 24px;flex-wrap:wrap;background:var(--bg);}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 16px;min-width:125px;}
  .sc .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .sc .val{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--accent);}
  .sc .val.r{color:var(--red-txt);}
  .sc .val.g{color:var(--green-txt);}
  .sc .sub{font-size:9px;color:var(--muted);margin-top:1px;}

  /* CONTROLS */
  .ctrl{display:flex;gap:9px;flex-wrap:wrap;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
  .tabs{display:flex;gap:4px;}
  .tab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
  .tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .tab:not(.on):hover{border-color:var(--accent);color:var(--accent);}
  .ctrl input[type=text]{padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;width:210px;outline:none;}
  .ctrl input:focus{border-color:var(--accent);}
  .ctrl select{padding:6px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;}
  .rc{margin-left:auto;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
  .rc b{color:var(--accent);}

  /* ERROR */
  .err{margin:12px 24px;padding:12px 14px;background:var(--red-bg);border:1px solid var(--red-txt);border-radius:7px;color:var(--red-txt);font-size:12px;line-height:1.6;display:none;}
  .err.on{display:block;}

  /* TABLE */
  .tbl-wrap{padding:18px 24px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  .gh th{background:var(--surface2);color:var(--accent);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:8px 9px;border:1px solid var(--border);text-align:center;white-space:nowrap;}
  .gh th.skh{background:var(--surface);color:var(--muted);}
  .sh th{background:var(--surface);color:var(--muted);font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:6px 9px;border:1px solid var(--border);text-align:center;position:sticky;top:53px;white-space:nowrap;}
  .sh th.skh{text-align:left;position:sticky;left:0;z-index:10;background:var(--surface);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:hover{background:rgba(78,154,241,.04);}
  td{padding:5px 9px;border-right:1px solid var(--border);text-align:center;white-space:nowrap;}
  td.skc{text-align:left;font-family:'Space Mono',monospace;font-size:10px;position:sticky;left:0;background:var(--bg);z-index:5;padding-left:11px;min-width:230px;border-right:2px solid var(--border);}
  td.tyc{font-size:10px;color:var(--muted);text-align:left;padding-left:8px;min-width:110px;border-right:1px solid var(--border);}
  tbody tr:hover td.skc,tbody tr:hover td.tyc{background:var(--surface2);}
  .cb{background:var(--blue-bg);color:var(--blue-txt);font-weight:500;}
  .cr{background:var(--red-bg);color:var(--red-txt);font-weight:500;}
  .cdr{background:#6b0000;color:#fca5a5;font-weight:700;}
  .cdg{background:var(--green-bg);color:var(--green-txt);font-weight:700;}
  .cz{background:var(--pink-bg);color:var(--pink-txt);}
  td.sep,th.sep{border-left:2px solid var(--accent2)!important;}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty .big{font-size:40px;margin-bottom:8px;}
</style>
</head>
<body>

<div id="overlay">
  <div class="ring"></div>
  <div class="load-lbl">Loading inventory data…</div>
  <div class="load-step" id="lstep">Connecting to Apps Script…</div>
</div>

<header>
  <div class="logo">INVENTORY<span>/</span>THRESHOLD</div>
  <div class="hdr-r">
    <div class="live-dot" title="Live data"></div>
    <span style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace" id="updatedAt">—</span>
    <button class="btn" id="rfBtn" onclick="loadAll()"><span id="rfIco">↻</span> Refresh</button>
  </div>
</header>

<div class="legend">
  <div class="li"><div class="dot d-blue"></div>Threshold &gt; 1</div>
  <div class="li"><div class="dot d-red"></div>Threshold = 0</div>
  <div class="li"><div class="dot d-pink"></div>SKU has zero threshold</div>
  <div class="li"><div class="dot d-dred"></div>BP Discrepancy</div>
  <div class="li"><div class="dot d-green"></div>Optimal Discrepancy</div>
</div>

<div id="errBanner" class="err"></div>

<div class="stats">
  <div class="sc"><div class="lbl">Total SKUs</div><div class="val" id="sSkus">—</div></div>
  <div class="sc"><div class="lbl">Warehouses</div><div class="val" id="sWH">—</div></div>
  <div class="sc"><div class="lbl">BP Discrepancies</div><div class="val r" id="sBP">—</div></div>
  <div class="sc"><div class="lbl">Optimal Discrepancies</div><div class="val g" id="sOpt">—</div></div>
  <div class="sc"><div class="lbl">Zero Threshold SKUs</div><div class="val r" id="sZero">—</div></div>
</div>

<div class="ctrl">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('all')">All SKUs</button>
    <button class="tab" onclick="switchTab('disc')">Discrepancy Only</button>
  </div>
  <input type="text" id="srch" placeholder="🔍 Search SKU…" oninput="render()"/>
  <select id="whSel" onchange="render()"><option value="">All Warehouses</option></select>
  <div class="rc" id="rc"><b>0</b> rows</div>
</div>

<div class="tbl-wrap"><div id="tw"></div></div>

<script>
// ── PASTE YOUR APPS SCRIPT WEB APP URL HERE ──────────────────
// After deploying, replace the placeholder below with your URL:
// e.g. https://script.google.com/macros/s/AKfycb.../exec
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyTFkM3SvVSlbj6yTL26qNa-FfE41cyldTCHtnOGn4gqoi5_AX7_qUIhnWdmC7IEod9/exec';
// ─────────────────────────────────────────────────────────────

let mode = 'all';
let DB   = { warehouses:[], rows:[], stats:{} };

function loadAll() {
  showOverlay(true);
  disableRefresh(true);
  hideErr();
  step('Fetching data from Apps Script…');

  // Remove any previous JSONP script tag
  const old = document.getElementById('jsonp_script');
  if (old) old.remove();
  if (window.__jsonpTimeout) clearTimeout(window.__jsonpTimeout);

  // JSONP callback
  window.__inventoryCallback = function(data) {
    const old = document.getElementById('jsonp_script');
    if (old) old.remove();
    clearTimeout(window.__jsonpTimeout);

    if (!data.ok) {
      showErr('Apps Script error: ' + (data.error || 'Unknown error'));
      showOverlay(false); disableRefresh(false); return;
    }

    DB = data;
    populateWHFilter();
    updateStats(data.stats);

    const d = new Date(data.updated);
    document.getElementById('updatedAt').textContent =
      d.toLocaleDateString() + ' ' + d.toLocaleTimeString();

    render();
    showOverlay(false);
    disableRefresh(false);
  };

  // Timeout fallback
  window.__jsonpTimeout = setTimeout(() => {
    showErr('Request timed out. Make sure the Apps Script is deployed with access set to "Anyone".');
    showOverlay(false); disableRefresh(false);
  }, 20000);

  // Inject script tag — bypasses CORS entirely
  const s = document.createElement('script');
  s.id  = 'jsonp_script';
  s.src = APPS_SCRIPT_URL + '?callback=__inventoryCallback';
  s.onerror = () => {
    clearTimeout(window.__jsonpTimeout);
    showErr('Failed to reach Apps Script. Check the URL and deployment settings.');
    showOverlay(false); disableRefresh(false);
  };
  document.head.appendChild(s);
}

function updateStats(s) {
  document.getElementById('sSkus').textContent  = s.totalSKUs;
  document.getElementById('sWH').textContent    = s.totalWH;
  document.getElementById('sBP').textContent    = s.totalBPDisc;
  document.getElementById('sOpt').textContent   = s.totalOptDisc;
  document.getElementById('sZero').textContent  = s.totalZero;
}

function populateWHFilter() {
  const sel = document.getElementById('whSel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Warehouses</option>';
  DB.warehouses.forEach(wh => {
    const o = document.createElement('option');
    o.value = wh; o.textContent = wh;
    if (wh === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function switchTab(t) {
  mode = t;
  document.querySelectorAll('.tabs .tab').forEach((el,i) =>
    el.classList.toggle('on', i === (t==='all' ? 0 : 1)));
  render();
}

function render() {
  const tw     = document.getElementById('tw');
  const search = document.getElementById('srch').value.toLowerCase();
  const whF    = document.getElementById('whSel').value;

  let whs  = DB.warehouses || [];
  if (whF) whs = whs.filter(w => w === whF);

  let rows = DB.rows || [];
  if (search) rows = rows.filter(r => r.sku.toLowerCase().includes(search));
  if (mode === 'disc') {
    rows = rows.filter(row =>
      whs.some(wh => {
        const c = row.cells[wh];
        return c && ((c.discBP !== null && c.discBP !== 0) || (c.discOpt !== null && c.discOpt !== 0));
      })
    );
  }

  document.getElementById('rc').innerHTML = `<b>${rows.length}</b> rows`;

  if (!DB.rows || !DB.rows.length) {
    tw.innerHTML = `<div class="empty"><div class="big">📦</div><p>Waiting for data…</p></div>`;
    return;
  }
  if (!rows.length) {
    tw.innerHTML = `<div class="empty"><div class="big">🔍</div><p>No rows match your filters.</p></div>`;
    return;
  }

  let h = '<table><thead>';

  // Group header row
  h += '<tr class="gh"><th class="skh" rowspan="2">SKU</th><th class="skh" rowspan="2" style="min-width:110px">Type</th>';
  whs.forEach((wh, i) => {
    h += `<th colspan="5"${i > 0 ? ' class="sep"' : ''}>${wh}</th>`;
  });
  h += '</tr>';

  // Sub-header row
  h += '<tr class="sh">';
  whs.forEach((wh, i) => {
    const s = i > 0 ? ' sep' : '';
    h += `<th class="${s}">Threshold</th><th>BP</th><th>Optimal</th><th>Disc BP</th><th>Disc Opt</th>`;
  });
  h += '</tr></thead><tbody>';

  rows.forEach(row => {
    const flagged = whs.some(wh => row.cells[wh] && row.cells[wh].th === 0);
    h += '<tr>';
    h += `<td class="skc${flagged ? ' cz' : ''}">${row.sku}</td>`;
    h += `<td class="tyc${flagged ? ' cz' : ''}">${row.type || ''}</td>`;

    whs.forEach((wh, i) => {
      const c   = row.cells[wh] || { th:null, bp:null, opt:null, discBP:null, discOpt:null };
      const sep = i > 0 ? ' sep' : '';

      // Threshold
      let tc = sep;
      if      (c.th === 0)              tc += ' cr';
      else if (c.th !== null && c.th > 1) tc += ' cb';
      h += `<td class="${tc}">${c.th !== null ? c.th : '—'}</td>`;

      // BP
      let bc = '';
      if      (c.bp === 0)              bc = ' cr';
      else if (c.bp !== null && c.bp > 1) bc = ' cb';
      h += `<td class="${bc}">${c.bp !== null ? c.bp : '—'}</td>`;

      // Optimal
      h += `<td>${c.opt !== null ? c.opt : '—'}</td>`;

      // Disc BP
      h += `<td class="${c.discBP !== null && c.discBP !== 0 ? ' cdr' : ''}">${c.discBP !== null ? (c.discBP > 0 ? '+' : '') + c.discBP : '—'}</td>`;

      // Disc Opt
      h += `<td class="${c.discOpt !== null && c.discOpt !== 0 ? ' cdg' : ''}">${c.discOpt !== null ? (c.discOpt > 0 ? '+' : '') + c.discOpt : '—'}</td>`;
    });
    h += '</tr>';
  });

  h += '</tbody></table>';
  tw.innerHTML = h;
}

function step(t)         { document.getElementById('lstep').textContent = t; }
function showOverlay(v)  { document.getElementById('overlay').classList.toggle('hide', !v); }
function disableRefresh(v) {
  document.getElementById('rfBtn').disabled = v;
  document.getElementById('rfIco').className = v ? 'spin-i' : '';
}
function hideErr()       { document.getElementById('errBanner').classList.remove('on'); }
function showErr(msg)    {
  const b = document.getElementById('errBanner');
  b.textContent = msg; b.classList.add('on');
}

// Boot
loadAll();
</script>
</body>
</html>
